rehydration:
  latest_rehydration_pack:
    dir: "Latest Rehydration Pack"
    bootstrap_prompt:
      filename_contains_any: ["BOOTSTRAP_PROMPT"]
      pick: "single_required"
    continuity_lock:
      filename_contains_any: ["CONTINUITY_LOCK"]
      pick: "single_required"

    execution_pack:
      dir: "Execution Pack"
      include_globs: ["*.txt", "*.md"]
      read: "all"
      order: "lexicographic"
      recursive: false

  buffs:
    dir: "Buffs"
    required_files:
      - "{BUFF_PREFIX}_EXECUTION_PROTOCOL.txt"
      - "{BUFF_PREFIX}_DATA_DIRECTORY_MAP.txt"
      - "{BUFF_PREFIX}_SESSION_START_CHECK.txt"

    # BUFF_PREFIX should match the subject identity used in Buff filenames.
    
    # Use "AUTO" to derive BUFF_PREFIX = UPPER(ACTIVE_SUBJECT)
    buff_prefix: "AUTO"

  snapshots:
    root_dir: "Snapshots"
    date_regex: "(\\d{4}-\\d{2}-\\d{2})"
    exclude_if_no_date: true
    exclude_name_contains: ["TEMPLATE"]

    control_sync:
      dir: "Control Sync"
      subject_prefix: "{ACTIVE_SUBJECT}_"
      pick: "latest_date_include_all"
      read_order: "lexicographic"

    end_of_day:
      dir: "End of Day"
      subject_prefix: "{ACTIVE_SUBJECT}_"
      pick: "latest_date_include_all"
      read_order: "lexicographic"

    general:
      dir: "General"

      # include_if is evaluated as ANY/OR across the list below.
      include_if:
        - "same_day_as_session_day"
        - "newer_than_session_day"

      # session_day is derived from the latest binding work day.
      session_day: "max(control_sync_day, end_of_day_day)"
      pick: "selected_date_include_all"
      read_order: "lexicographic"

  guild_orders:
    root_dir: "Guild Orders"
    active_dir: "ACTIVE"
    paused_dir: "PAUSED"
    completed_dir: "COMPLETED"
    active_set_pick: "all_files"

  quest_board:
    dir: "Quest Board"
    accepted_dir: "Accepted"
    completed_dir: "Completed"
    abandoned_dir: "Abandoned"
    open_quests_pick: "root_files_only"

  audits:
    root_dir: "Audits"
    execution_dir: "Execution"
