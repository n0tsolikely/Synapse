# SYNAPSE_STATE.yaml
# Version: v1.6
# Last Updated: 2026-02-13
#
# PURPOSE
# - Deterministic rehydration + routing manifest for Synapse OS.
# - Mirrors README.txt → REQUIRED READ ORDER and resolves "latest" subject artifacts.
#
# AUTHORITY + SAFETY
# - This file does NOT grant execution authority. It only routes what must be read.
# - Terminology Locks override all non-lock text. This file MUST NOT be used to bypass Locks.
# - If a required artifact cannot be proven present/readable at the resolved path:
#   - Disclosure Gate MUST trigger
#   - execution authority is INVALID
#   - no guessing / no improv
#
# PATH RULE (CANON)
# - All paths in this file are WORKSPACE-RELATIVE.
# - governance_pack.root MUST point to the extracted governance pack directory
#   (the directory that contains README.txt + INDEX.txt).
# - subject_data.roots MUST point to canonical {ACTIVE_SUBJECT}_Data/ directories
#   (i.e., directories that contain the Subject Data Skeleton).

schema_version: 2

# =============================================================================
# CANONICAL ROOTS
# =============================================================================

governance_pack:
  # Expected default when the Governance Pack is extracted into the workspace root.
  root: "Synapse_OS_Governance(AI)"
subject_data:
  # One or more canonical {ACTIVE_SUBJECT}_Data roots.
  # NOTE: Each root MUST itself be the {ACTIVE_SUBJECT}_Data directory (no wrapper folders).
  # Example: "{ACTIVE_SUBJECT}_Data"
  roots:
    - "{ACTIVE_SUBJECT}_Data"

  # SUBJECT-LOCAL STATE (IMPORTANT)
  # - This SYNAPSE_STATE.yaml lives with the GOVERNANCE pack and is universal.
  # - Subject-specific state/config (if any) MUST live inside each subject's data root
  #   per Terminology Locks (e.g., Subject Data Skeleton). Do NOT hardcode a specific
  #   subject (like Ashby) into this governance-level file.
  # - This governance file may resolve ACTIVE_SUBJECT, but it does not define the
  #   per-subject YAML schema. That schema belongs to the Subject Model / subject docs.


  # active_subject determines placeholder expansion (e.g., {ACTIVE_SUBJECT}_ in Snapshots).
  # Allowed:
  # - "auto" (infer from state)
  # - explicit subject name (string)
  active_subject: "auto"

  infer_active_subject:
    # If true, infer ACTIVE_SUBJECT from presence of ACTIVE Guild Orders.
    from_active_guild_orders: true

    # If inference yields multiple candidates or none:
    # - do not guess
    # - ask Hands
    if_ambiguous: "ask_hands"

  # Directories containing any of these substrings are ignored when scanning roots.
  # (This is defensive against junk packaging artifacts.)
  ignore_dir_name_contains:
    - "(IGNORE)"
    - "__MACOSX"

# =============================================================================
# REQUIRED READ ORDER (SESSION-LEVEL, DO NOT SKIP)
# =============================================================================
# This list MUST mirror README.txt → REQUIRED READ ORDER.
# The list is SEQUENTIAL. Items must be resolved + read in this exact order.

required_read_order:
  - governance: "README.txt"
  - governance: "INDEX.txt"
  - governance: "SYNAPSE_STATE.yaml"
  - governance: "Continuity/SYNAPSE_GUILD__BOOTSTRAP_PROMPT.txt"
